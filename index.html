<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Public Toilet Manager Pro</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
      <!-- HEADER -->

      <div class="bg-white rounded-xl shadow p-6 mb-6">
        <div class="flex justify-between items-center">
          <div>
            <h1 class="text-3xl font-bold text-gray-800">
              🚻 Public Toilet Manager Pro
            </h1>

            <p class="text-gray-500">Quản lý nhà vệ sinh công cộng</p>
          </div>

          <button
            class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg shadow"
            id="btn-add"
          >
            ➕ Thêm mới
          </button>
        </div>
      </div>

      <!-- TOOLBAR -->

      <div class="bg-white rounded-xl shadow p-6 mb-6">
        <div class="grid md:grid-cols-4 gap-4">
          <input class="border p-3 rounded-lg" placeholder="Tìm theo tên" />

          <input class="border p-3 rounded-lg" placeholder="Tìm theo quận" />

          <select class="border p-3 rounded-lg">
            <option>Tất cả</option>

            <option>Miễn phí</option>

            <option>Thu phí</option>
          </select>

          <button class="bg-gray-800 text-white rounded-lg">Reset</button>
        </div>
      </div>

      <!-- LIST -->

      <div class="grid md:grid-cols-3 gap-6" id="toilets-list">
        <!-- CARD -->
      </div>
    </div>

    <!-- MODAL FORM -->

    <div
      class="fixed inset-0 bg-black/50 hidden items-center justify-center"
      id="modal"
    >
      <div class="bg-white w-[700px] rounded-xl shadow-lg p-6 mx-auto">
        <div class="flex justify-between mb-5">
          <h2 class="text-xl font-bold text-blue-600" id="lbl-title"></h2>

          <button class="text-gray-500 text-xl" id="btn-close-modal">✖</button>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <input class="border p-3 rounded" placeholder="Tên" id="input-name" />

          <input
            class="border p-3 rounded"
            placeholder="Địa chỉ"
            id="input-address"
          />

          <input
            type="number"
            class="border p-3 rounded"
            placeholder="Giá đi nhẹ"
            id="input-urination"
          />

          <input
            type="number"
            class="border p-3 rounded"
            placeholder="Giá đi nặng"
            id="input-defecation"
          />

          <input
            type="number"
            class="border p-3 rounded"
            placeholder="Độ sạch"
            id="input-cleanliness"
          />

          <input
            type="number"
            class="border p-3 rounded"
            placeholder="Số cuộn giấy"
            id="input-toiletPaperRolls"
          />

          <select class="border p-3 rounded" id="input-status">
            <option>Hoạt động</option>

            <option>Đang vệ sinh</option>

            <option>Tạm đóng</option>
          </select>

          <input
            class="border p-3 rounded"
            placeholder="08:00 - 22:00"
            id="input-openHour"
          />

          <input
            type="file"
            class="border p-3 rounded col-span-2"
            id="input-image"
          />

          <textarea
            class="border p-3 rounded col-span-2"
            placeholder="Mô tả"
            id="input-description"
          ></textarea>
        </div>

        <div class="flex justify-end gap-3 mt-6">
          <button
            class="bg-gray-400 text-white px-5 py-2 rounded"
            id="btn-cancel"
          >
            Hủy
          </button>

          <button
            class="bg-emerald-500 text-white px-5 py-2 rounded"
            id="btn-save"
          >
            💾 Lưu
          </button>
        </div>
      </div>
    </div>

    <!-- DELETE MODAL -->

    <div class="fixed inset-0 bg-black/50 hidden items-center justify-center">
      <div class="bg-white p-6 rounded-xl shadow w-[400px] text-center">
        <h3 class="text-xl font-bold mb-3">Xác nhận xóa</h3>

        <p class="text-gray-500 mb-6">Bạn chắc chắn muốn xóa?</p>

        <div class="flex gap-3">
          <button class="bg-gray-400 text-white w-full py-2 rounded">
            Hủy
          </button>

          <button class="bg-red-500 text-white w-full py-2 rounded">Xóa</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
