<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Public Toilet Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="script.js"></script>
  </head>

  <body class="bg-slate-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-8">
      <h1 class="text-3xl font-bold text-slate-700 mb-6">
        🚻 Public Toilet Management
      </h1>

      <div class="grid grid-cols-12 gap-6">
        <!-- FORM -->
        <div class="col-span-4 bg-white p-6 rounded-2xl shadow-lg h-fit">
          <h2 class="text-xl font-semibold mb-4 text-slate-600">
            Toilet Information
          </h2>

          <div class="space-y-3">
            <input
              id="toiletName"
              placeholder="Tên"
              class="w-full border p-2 rounded-lg"
            />

            <input
              id="district"
              placeholder="Quận"
              class="w-full border p-2 rounded-lg"
            />

            <div class="grid grid-cols-2 gap-2">
              <input
                id="priceUrination"
                type="number"
                placeholder="Giá đi nhẹ"
                class="border p-2 rounded-lg"
              />

              <input
                id="priceDefecation"
                type="number"
                placeholder="Giá đi nặng"
                class="border p-2 rounded-lg"
              />
            </div>

            <div class="grid grid-cols-2 gap-2">
              <input
                id="cleanliness"
                type="number"
                placeholder="Độ sạch"
                class="border p-2 rounded-lg"
              />

              <input
                id="paper"
                type="number"
                placeholder="Số cuộn giấy"
                class="border p-2 rounded-lg"
              />
            </div>

            <select id="status" class="w-full border p-2 rounded-lg">
              <option>Hoạt động</option>
              <option>Đang vệ sinh</option>
            </select>

            <input
              id="openingHours"
              placeholder="Giờ mở cửa"
              class="w-full border p-2 rounded-lg"
            />

            <input
              id="image"
              placeholder="Image URL"
              class="w-full border p-2 rounded-lg"
            />

            <textarea
              id="description"
              placeholder="Mô tả"
              class="w-full border p-2 rounded-lg"
            ></textarea>

            <div class="flex gap-3 pt-3">
              <button
                onclick="addToilet()"
                class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-medium p-2.5 rounded-xl shadow hover:shadow-lg transition"
              >
                ➕ Add
              </button>

              <button
                onclick="updateToilet()"
                class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-medium p-2.5 rounded-xl shadow hover:shadow-lg transition"
              >
                ✏️ Update
              </button>
            </div>
          </div>
        </div>

        <!-- CARD LIST -->
        <div class="col-span-8">
          <div class="flex justify-between mb-4">
            <h2 class="text-xl font-semibold text-slate-600">Toilet List</h2>

            <input
              id="search"
              onkeyup="searchToilet()"
              placeholder="🔍 Search..."
              class="border p-2 rounded-lg bg-white"
            />
          </div>

          <div id="cardContainer" class="grid grid-cols-2 gap-5"></div>
        </div>
      </div>
    </div>
  </body>
</html>
