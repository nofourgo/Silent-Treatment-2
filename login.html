<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - Public Toilet Manager Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
  </style>
</head>
<body>
  <div class="w-full max-w-md">
    <!-- Logo & Title -->
    <div class="text-center mb-8">
      <h1 class="text-5xl mb-2">🚻</h1>
      <h2 class="text-3xl font-bold text-white mb-2">Public Toilet Manager Pro</h2>
      <p class="text-gray-200">Quản lý nhà vệ sinh công cộng</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-xl shadow-2xl p-8">
      <h3 class="text-2xl font-bold text-gray-800 mb-6 text-center">Đăng nhập</h3>

      <!-- Error Message -->
      <div id="errorMsg" class="hidden mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded">
        <p id="errorText"></p>
      </div>

      <!-- Success Message -->
      <div id="successMsg" class="hidden mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded">
        <p id="successText"></p>
      </div>

      <form id="loginForm" class="space-y-4">
        <!-- Username Input -->
        <div>
          <label class="block text-gray-700 font-medium mb-2">Tên đăng nhập</label>
          <input
            type="text"
            id="username"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 transition"
            placeholder="Nhập tên đăng nhập"
            required
          />
        </div>

        <!-- Password Input -->
        <div>
          <label class="block text-gray-700 font-medium mb-2">Mật khẩu</label>
          <input
            type="password"
            id="password"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 transition"
            placeholder="Nhập mật khẩu"
            required
          />
        </div>

        <!-- Remember Me -->
        <div class="flex items-center">
          <input
            type="checkbox"
            id="rememberMe"
            class="w-4 h-4 text-purple-500 rounded focus:ring-2 focus:ring-purple-500"
          />
          <label for="rememberMe" class="ml-2 text-gray-700">Ghi nhớ tôi</label>
        </div>

        <!-- Login Button -->
        <button
          type="submit"
          class="w-full bg-gradient-to-r from-purple-500 to-purple-600 hover:from-purple-600 hover:to-purple-700 text-white font-bold py-3 rounded-lg transition transform hover:scale-105 active:scale-95"
        >
          Đăng nhập
        </button>
      </form>

      <!-- Demo Credentials -->
      <div class="mt-6 p-4 bg-gray-100 rounded-lg">
        <p class="text-sm text-gray-600 font-medium mb-2">📝 Tài khoản demo:</p>
        <p class="text-sm text-gray-700"><strong>Username:</strong> admin</p>
        <p class="text-sm text-gray-700"><strong>Password:</strong> 123456</p>
      </div>

      <!-- Footer -->
      <p class="mt-6 text-center text-gray-600 text-sm">
        Hoặc <a href="javascript:void(0)" id="guestLink" class="text-purple-500 hover:text-purple-600 font-medium">truy cập nhanh</a>
      </p>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
