<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cửa Hàng Hạt Giống - Green Garden</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .cart-animate {
        transition: all 0.3s ease;
      }
    </style>
  </head>
  <body class="bg-gray-50 font-sans">
    <header class="bg-green-600 text-white p-4 shadow-lg sticky top-0 z-10">
      <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-bold italic">🌱 Green Garden</h1>
        <button
          onclick="toggleCart()"
          class="relative p-2 bg-green-700 rounded-full hover:bg-green-800 transition"
        >
          🛒 Giỏ hàng
          <span
            id="cart-count"
            class="absolute -top-1 -right-1 bg-red-500 text-xs rounded-full h-5 w-5 flex items-center justify-center"
            >0</span
          >
        </button>
      </div>
    </header>

    <main class="container mx-auto p-6 flex flex-col md:flex-row gap-6">
      <div class="md:w-2/3">
        <h2 class="text-xl font-semibold mb-4 text-gray-700">
          Danh Mục Hạt Giống
        </h2>
        <div
          id="seed-list"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"
        ></div>
      </div>

      <div
        id="cart-section"
        class="md:w-1/3 bg-white p-4 rounded-lg shadow-md h-fit"
      >
        <h2 class="text-xl font-semibold mb-4 border-b pb-2">
          Chi tiết đơn hàng
        </h2>
        <div id="cart-items" class="space-y-3 mb-4 max-h-96 overflow-y-auto">
          <p class="text-gray-400 italic">Chưa có sản phẩm nào...</p>
        </div>
        <div class="border-t pt-4">
          <div class="flex justify-between font-bold text-lg">
            <span>Tổng tiền:</span>
            <span id="total-price" class="text-green-600">0đ</span>
          </div>
          <button
            onclick="checkout()"
            class="w-full mt-4 bg-orange-500 text-white py-2 rounded-lg font-bold hover:bg-orange-600 transition shadow-md"
          >
            THANH TOÁN NGAY
          </button>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
